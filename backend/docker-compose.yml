version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: transfer-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: transfer
      POSTGRES_PASSWORD: transfer123
      POSTGRES_DB: transfer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transfer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
    name: transfer-pgdata
